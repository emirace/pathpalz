name: Web staging CI/CD to cPanel (SCP stable hardened)

on:
  push:
    branches:
      - pre-prod
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      CACHE_BUST: v3

    steps:
      # =========================
      # CHECKOUT
      # =========================
      - name: Checkout code
        uses: actions/checkout@v4

      # =========================
      # NODE
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # =========================
      # CACHE
      # =========================
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}-${{ env.CACHE_BUST }}
          restore-keys: |
            npm-${{ runner.os }}-node22-

      # =========================
      # BUILD
      # =========================
      - name: Install dependencies
        run: npm ci

      - name: Create build version file
        run: |
          mkdir -p public
          cat <<EOF > public/version.json
          {
            "branch": "${GITHUB_REF_NAME}",
            "sha": "${GITHUB_SHA}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_number": "${GITHUB_RUN_NUMBER}",
            "built_at": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          }
          EOF

      - name: Build
        run: npm run build

      # =========================
      # SSH SETUP
      # =========================
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.STAGING_CPANEL_SSH_PRIVATE_KEY }}
          SSH_PASSPHRASE: ${{ secrets.STAGING_CPANEL_SSH_PASSPHRASE }}
        run: |
          set -e

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          PORT="${{ secrets.STAGING_CPANEL_SSH_PORT }}"
          if [ -z "$PORT" ]; then PORT=22; fi

          ssh-keyscan -p "$PORT" -H "${{ secrets.STAGING_CPANEL_SSH_HOST }}" >> ~/.ssh/known_hosts

          eval "$(ssh-agent -s)"

          echo '#!/bin/sh' > ~/.ssh_askpass
          echo 'echo "$SSH_PASSPHRASE"' >> ~/.ssh_askpass
          chmod +x ~/.ssh_askpass

          export SSH_ASKPASS=~/.ssh_askpass
          export DISPLAY=:0
          export SSH_ASKPASS_REQUIRE=force

          ssh-add <(echo "$SSH_PRIVATE_KEY")

      # =========================
      # REMOTE PREP (ONLY SSH #1)
      # =========================
      - name: Prepare remote staging + backup
        run: |
          set -e

          SERVER="${{ secrets.STAGING_CPANEL_SSH_USER }}@${{ secrets.STAGING_CPANEL_SSH_HOST }}"
          PORT="${{ secrets.STAGING_CPANEL_SSH_PORT }}"
          APP_DIR="${{ secrets.STAGING_CPANEL_TARGET_DIR }}"
          STAGING_DIR="${APP_DIR}_staging"

          ssh -o ConnectTimeout=20 -p $PORT $SERVER << 'EOF'
          set -e

          APP_DIR="'"$APP_DIR"'"
          STAGING_DIR="'"$STAGING_DIR"'"
          BACKUP_DIR="$APP_DIR/backups"
          TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")

          mkdir -p "$STAGING_DIR"
          mkdir -p "$BACKUP_DIR"

          if [ -d "$APP_DIR" ]; then
            zip -r "$BACKUP_DIR/live_$TIMESTAMP.zip" "$APP_DIR" \
              -x "$BACKUP_DIR/*" >/dev/null 2>&1 || true
          fi

          ls -tp "$BACKUP_DIR"/*.zip 2>/dev/null | tail -n +3 | xargs -r rm --

          echo "REMOTE READY"
          EOF

      # =========================
      # SCP DEPLOY (ONLY TRANSFER STEP)
      # =========================
      - name: Upload build to staging (SCP)
        run: |
          set -e

          SERVER="${{ secrets.STAGING_CPANEL_SSH_USER }}@${{ secrets.STAGING_CPANEL_SSH_HOST }}"
          PORT="${{ secrets.STAGING_CPANEL_SSH_PORT }}"
          STAGING_DIR="${{ secrets.STAGING_CPANEL_TARGET_DIR }}_staging"

          # IMPORTANT: small delay reduces firewall suspicion
          sleep 5

          scp -o ConnectTimeout=20 -P $PORT -r out/* "$SERVER:$STAGING_DIR/"

      # =========================
      # SWAP (ONLY SSH #2)
      # =========================
      - name: Swap staging to live
        run: |
          set -e

          SERVER="${{ secrets.STAGING_CPANEL_SSH_USER }}@${{ secrets.STAGING_CPANEL_SSH_HOST }}"
          PORT="${{ secrets.STAGING_CPANEL_SSH_PORT }}"
          APP_DIR="${{ secrets.STAGING_CPANEL_TARGET_DIR }}"
          STAGING_DIR="${APP_DIR}_staging"

          # IMPORTANT: delay prevents rapid SSH after SCP
          sleep 8

          ssh -o ConnectTimeout=20 -p $PORT $SERVER << 'EOF'
          set -e

          APP_DIR="'"$APP_DIR"'"
          STAGING_DIR="'"$STAGING_DIR"'"

          find "$APP_DIR" -mindepth 1 \
            ! -name "backups" \
            ! -name ".htaccess" \
            -exec rm -rf {} +

          cp -r "$STAGING_DIR/"* "$APP_DIR/"
          rm -rf "$STAGING_DIR"

          echo "DEPLOY COMPLETE"
          EOF

      # =========================
      # VERIFY (OPTIONAL SSH #3 but safe)
      # =========================
      - name: Verify deployment
        run: |
          set -e

          SERVER="${{ secrets.STAGING_CPANEL_SSH_USER }}@${{ secrets.STAGING_CPANEL_SSH_HOST }}"
          PORT="${{ secrets.STAGING_CPANEL_SSH_PORT }}"
          APP_DIR="${{ secrets.STAGING_CPANEL_TARGET_DIR }}"

          sleep 5

          ssh -o ConnectTimeout=20 -p $PORT $SERVER << 'EOF'
          set -e

          APP_DIR="'"$APP_DIR"'"

          echo "CHECKING DEPLOYMENT"
          ls -la "$APP_DIR/index.html" || echo "Missing index.html"
          cat "$APP_DIR/version.json" || echo "Missing version.json"
          EOF