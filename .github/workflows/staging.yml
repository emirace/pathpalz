name: Web staging CI/CD to cPanel (stable SSH key version)

on:
  push:
    branches:
      - pre-prod
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      CACHE_BUST: v3

    steps:
      # =========================
      # CHECKOUT
      # =========================
      - name: Checkout code
        uses: actions/checkout@v4

      # =========================
      # NODE SETUP
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # =========================
      # CACHE
      # =========================
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}-${{ env.CACHE_BUST }}
          restore-keys: |
            npm-${{ runner.os }}-node22-

      - name: Cache Next.js
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: next-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ env.CACHE_BUST }}
          restore-keys: |
            next-${{ runner.os }}-

      # =========================
      # INSTALL + BUILD
      # =========================
      - name: Install dependencies
        run: npm ci

      - name: Create build version file
        run: |
          mkdir -p public
          cat <<EOF > public/version.json
          {
            "branch": "${GITHUB_REF_NAME}",
            "sha": "${GITHUB_SHA}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_number": "${GITHUB_RUN_NUMBER}",
            "built_at": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          }
          EOF

      - name: Build Next.js static export
        run: npm run build

      # =========================
      # SSH KEY SETUP (FIXED - NO AGENT)
      # =========================
      - name: Setup SSH key
        run: |
          set -e

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          PORT="${{ secrets.STAGING_CPANEL_SSH_PORT }}"
          if [ -z "$PORT" ]; then PORT=22; fi

          # Write private key safely
          echo "${{ secrets.STAGING_CPANEL_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Add host to known hosts
          ssh-keyscan -p "$PORT" -H "${{ secrets.STAGING_CPANEL_SSH_HOST }}" >> ~/.ssh/known_hosts

          echo "SSH_KEY_READY=1" >> $GITHUB_ENV

      # =========================
      # REMOTE PREP (SSH #1)
      # =========================
      - name: Prepare remote staging + backup
        run: |
          set -e

          SERVER="${{ secrets.STAGING_CPANEL_SSH_USER }}@${{ secrets.STAGING_CPANEL_SSH_HOST }}"
          PORT="${{ secrets.STAGING_CPANEL_SSH_PORT }}"
          APP_DIR="${{ secrets.STAGING_CPANEL_TARGET_DIR }}"
          STAGING_DIR="${APP_DIR}_staging"

          ssh -i ~/.ssh/id_rsa -o ConnectTimeout=20 -p $PORT $SERVER << EOF
          set -e

          BACKUP_DIR="$APP_DIR/backups"
          TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")

          mkdir -p "$STAGING_DIR"
          mkdir -p "$BACKUP_DIR"

          # Backup live site
          if [ -d "$APP_DIR" ]; then
            zip -r "$BACKUP_DIR/live_$TIMESTAMP.zip" "$APP_DIR" \
              -x "$BACKUP_DIR/*" >/dev/null 2>&1 || true
          fi

          # Keep only last 2 backups
          ls -tp "$BACKUP_DIR"/*.zip 2>/dev/null | tail -n +3 | xargs -r rm --

          echo "REMOTE READY"
          EOF

      # =========================
      # SCP DEPLOY (UPLOAD ONLY)
      # =========================
      - name: Deploy to staging (SCP)
        run: |
          set -e

          SERVER="${{ secrets.STAGING_CPANEL_SSH_USER }}@${{ secrets.STAGING_CPANEL_SSH_HOST }}"
          PORT="${{ secrets.STAGING_CPANEL_SSH_PORT }}"
          STAGING_DIR="${{ secrets.STAGING_CPANEL_TARGET_DIR }}_staging"

          scp -i ~/.ssh/id_rsa -o ConnectTimeout=20 -P $PORT -r out/* "$SERVER:$STAGING_DIR/"

      # =========================
      # SWAP (SSH #2)
      # =========================
      - name: Swap staging to live
        run: |
          set -e

          SERVER="${{ secrets.STAGING_CPANEL_SSH_USER }}@${{ secrets.STAGING_CPANEL_SSH_HOST }}"
          PORT="${{ secrets.STAGING_CPANEL_SSH_PORT }}"
          APP_DIR="${{ secrets.STAGING_CPANEL_TARGET_DIR }}"
          STAGING_DIR="${APP_DIR}_staging"

          ssh -i ~/.ssh/id_rsa -o ConnectTimeout=20 -p $PORT $SERVER << EOF
          set -e

          # Clean live (preserve backups + htaccess)
          find "$APP_DIR" -mindepth 1 \
            ! -name "backups" \
            ! -name ".htaccess" \
            -exec rm -rf {} +

          # Promote staging → live
          cp -r "$STAGING_DIR/"* "$APP_DIR/"
          rm -rf "$STAGING_DIR"

          echo "DEPLOY COMPLETE"
          EOF

      # =========================
      # VERIFY (OPTIONAL SSH #3)
      # =========================
      - name: Verify deployment
        run: |
          set -e

          SERVER="${{ secrets.STAGING_CPANEL_SSH_USER }}@${{ secrets.STAGING_CPANEL_SSH_HOST }}"
          PORT="${{ secrets.STAGING_CPANEL_SSH_PORT }}"
          APP_DIR="${{ secrets.STAGING_CPANEL_TARGET_DIR }}"

          ssh -i ~/.ssh/id_rsa -o ConnectTimeout=20 -p $PORT $SERVER << EOF

          echo "===================="
          echo "DEPLOYMENT CHECK"
          echo "===================="

          ls -la "$APP_DIR/index.html" || echo "Missing index.html"
          cat "$APP_DIR/version.json" || echo "Missing version.json"

          echo "DONE"
          EOF