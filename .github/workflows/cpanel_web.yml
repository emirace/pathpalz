name: Web CI/CD to cPanel (main_pathpalz)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      CACHE_BUST: v2

    steps:
      # =========================
      # CHECKOUT
      # =========================
      - name: Checkout code
        uses: actions/checkout@v4

      # =========================
      # NODE SETUP
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # =========================
      # CACHE NPM
      # =========================
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}-${{ env.CACHE_BUST }}
          restore-keys: |
            npm-${{ runner.os }}-node22-

      # =========================
      # CACHE NEXT.JS
      # =========================
      - name: Cache Next.js
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: next-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ env.CACHE_BUST }}
          restore-keys: |
            next-${{ runner.os }}-

      # =========================
      # INSTALL DEPENDENCIES
      # =========================
      - name: Install dependencies
        run: npm ci

      # =========================
      # BUILD VERSION FILE
      # =========================
      - name: Create build version file
        run: |
          echo "{
            \"branch\": \"${GITHUB_REF_NAME}\",
            \"sha\": \"${GITHUB_SHA}\",
            \"run_id\": \"${GITHUB_RUN_ID}\",
            \"run_number\": \"${GITHUB_RUN_NUMBER}\",
            \"built_at\": \"$(date -u +'%Y-%m-%dT%H:%M:%SZ')\"
          }" > public/version.json

      # =========================
      # BUILD NEXT.JS
      # =========================
      - name: Build Next.js static export
        run: npm run build

      # =========================
      # SSH SETUP (ASKPASS FIX)
      # =========================
      - name: Setup SSH (ASKPASS FIX)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
          SSH_PASSPHRASE: ${{ secrets.CPANEL_SSH_PASSPHRASE }}
        run: |
          set -e

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          PORT="${{ secrets.CPANEL_SSH_PORT }}"
          if [ -z "$PORT" ]; then PORT=22; fi

          ssh-keyscan -p "$PORT" -H "${{ secrets.CPANEL_SSH_HOST }}" >> ~/.ssh/known_hosts

          eval "$(ssh-agent -s)"

          # Create SSH ASKPASS helper
          echo '#!/bin/sh' > ~/.ssh_askpass
          echo 'echo "$SSH_PASSPHRASE"' >> ~/.ssh_askpass

          chmod +x ~/.ssh_askpass

          export SSH_ASKPASS=~/.ssh_askpass
          export DISPLAY=:0
          export SSH_ASKPASS_REQUIRE=force

          # Add SSH key (non-interactive)
          setsid ssh-add <(echo "$SSH_PRIVATE_KEY") </dev/null

          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV

      # =========================
      # BACKUP PRODUCTION
      # =========================
      - name: Backup production
        run: |
          ssh -p ${{ secrets.CPANEL_SSH_PORT }} \
          ${{ secrets.CPANEL_SSH_USER }}@${{ secrets.CPANEL_SSH_HOST }} '
            set -e

            APP_DIR="${{ secrets.CPANEL_TARGET_DIR }}"
            BACKUP_DIR="$APP_DIR/backups"
            TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")

            mkdir -p "$BACKUP_DIR"

            if [ -d "$APP_DIR" ]; then
              zip -r "$BACKUP_DIR/live_$TIMESTAMP.zip" "$APP_DIR" \
                -x "$APP_DIR/backups/*" >/dev/null 2>&1 || true
            fi

            # Keep last 2 backups
            ls -tp "$BACKUP_DIR"/*.zip 2>/dev/null | tail -n +3 | xargs -r rm --

            echo "✅ Backup complete"
          '

      # =========================
      # DEPLOY (STAGING + RSYNC)
      # =========================
      - name: Deploy to cPanel (safe atomic deploy)
        run: |
          set -e

          SERVER="${{ secrets.CPANEL_SSH_USER }}@${{ secrets.CPANEL_SSH_HOST }}"
          PORT="${{ secrets.CPANEL_SSH_PORT }}"
          APP_DIR="${{ secrets.CPANEL_TARGET_DIR }}"
          STAGING_DIR="${APP_DIR}_staging"

          # Create staging folder
          ssh -p $PORT $SERVER "mkdir -p $STAGING_DIR"

          # Sync build to staging
          rsync -avz -e "ssh -p $PORT" \
            --delete \
            --exclude=".htaccess" \
            --exclude="backups" \
            --exclude=".env" \
            out/ \
            "$SERVER:$STAGING_DIR/"

          # Swap staging → live
          ssh -p $PORT $SERVER '
            set -e

            APP_DIR="${{ secrets.CPANEL_TARGET_DIR }}"
            STAGING_DIR="${APP_DIR}_staging"
            BACKUP_DIR="$APP_DIR/backups"

            mkdir -p "$BACKUP_DIR"

            # Clean live (protect .htaccess + backups)
            find "$APP_DIR" -mindepth 1 \
              ! -name "backups" \
              ! -name ".htaccess" \
              -exec rm -rf {} +

            # Move staging into live
            rsync -a "$STAGING_DIR/" "$APP_DIR/"

            rm -rf "$STAGING_DIR"

            echo "✅ Deployment complete"
          '

      # =========================
      # VERIFY DEPLOYMENT
      # =========================
      - name: Verify deployment
        run: |
          ssh -p ${{ secrets.CPANEL_SSH_PORT }} \
          ${{ secrets.CPANEL_SSH_USER }}@${{ secrets.CPANEL_SSH_HOST }} '
            set -e

            APP_DIR="${{ secrets.CPANEL_TARGET_DIR }}"

            echo "=============================="
            echo " DEPLOYMENT VERIFICATION "
            echo "=============================="

            ls -la "$APP_DIR/index.html" || echo "Missing index.html"
            ls -la "$APP_DIR/.htaccess" || echo "Missing .htaccess"

            echo ""
            cat "$APP_DIR/version.json" || echo "Missing version.json"

            echo ""
            echo "=============================="
            echo "DONE"
          '
