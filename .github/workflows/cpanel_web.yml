name: Web CI/CD to cPanel (main_pathpalz)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      CACHE_BUST: v2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # =========================
      # CACHE
      # =========================
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}-${{ env.CACHE_BUST }}
          restore-keys: |
            npm-${{ runner.os }}-node22-

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: next-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ env.CACHE_BUST }}
          restore-keys: |
            next-${{ runner.os }}-

      # =========================
      # INSTALL + BUILD
      # =========================
      - name: Install dependencies
        run: npm ci

      - name: Create build version file
        run: |
          echo "{
            \"branch\": \"${GITHUB_REF_NAME}\",
            \"sha\": \"${GITHUB_SHA}\",
            \"run_id\": \"${GITHUB_RUN_ID}\",
            \"run_number\": \"${GITHUB_RUN_NUMBER}\",
            \"built_at\": \"$(date -u +'%Y-%m-%dT%H:%M:%SZ')\"
          }" > public/version.json

      - name: Build Next.js static export
        run: npm run build

      # =========================
      # SSH SETUP
      # =========================
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
          SSH_PASSPHRASE: ${{ secrets.CPANEL_SSH_PASSPHRASE }}
        run: |
          set -e

          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "❌ Missing SSH key"
            exit 1
          fi

          mkdir -p ~/.ssh
          PORT="${{ secrets.CPANEL_SSH_PORT }}"
          if [ -z "$PORT" ]; then PORT=22; fi

          ssh-keyscan -p "$PORT" -H "${{ secrets.CPANEL_SSH_HOST }}" >> ~/.ssh/known_hosts

          eval $(ssh-agent -s)
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -

          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV

      # =========================
      # BACKUP LIVE SITE
      # =========================
      - name: Backup current production
        run: |
          ssh -p ${{ secrets.CPANEL_SSH_PORT }} \
          ${{ secrets.CPANEL_SSH_USER }}@${{ secrets.CPANEL_SSH_HOST }} << 'EOF'
            set -e

            APP_DIR="${{ secrets.CPANEL_TARGET_DIR }}"
            BACKUP_DIR="$APP_DIR/backups"
            TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")

            mkdir -p "$BACKUP_DIR"

            if [ -d "$APP_DIR" ]; then
              zip -r "$BACKUP_DIR/live_$TIMESTAMP.zip" "$APP_DIR" \
                -x "$APP_DIR/backups/*" >/dev/null 2>&1 || true
            fi

            # Keep last 2 backups only
            ls -tp "$BACKUP_DIR"/*.zip 2>/dev/null | tail -n +3 | xargs -r rm --

            echo "✅ Backup complete"
          EOF

      # =========================
      # SAFE DEPLOY (RSYNC + STAGING)
      # =========================
      - name: Deploy (safe atomic release)
        run: |
          set -e

          SERVER="${{ secrets.CPANEL_SSH_USER }}@${{ secrets.CPANEL_SSH_HOST }}"
          PORT="${{ secrets.CPANEL_SSH_PORT }}"
          APP_DIR="${{ secrets.CPANEL_TARGET_DIR }}"
          STAGING_DIR="${APP_DIR}_staging"

          echo "📦 Creating staging folder..."
          ssh -p $PORT $SERVER "mkdir -p $STAGING_DIR"

          echo "🚀 Syncing build to staging (safe mode)..."

          rsync -avz -e "ssh -p $PORT" \
            --delete \
            --exclude=".htaccess" \
            --exclude="backups" \
            --exclude=".env" \
            out/ \
            "$SERVER:$STAGING_DIR/"

          echo "🔄 Swapping staging → live..."

          ssh -p $PORT $SERVER << EOF
            set -e

            APP_DIR="${{ secrets.CPANEL_TARGET_DIR }}"
            STAGING_DIR="${APP_DIR}_staging"
            BACKUP_DIR="$APP_DIR/backups"

            # Ensure backup dir exists
            mkdir -p "$BACKUP_DIR"

            # Remove old live (except protected files)
            find "$APP_DIR" -mindepth 1 \
              ! -name "backups" \
              ! -name ".htaccess" \
              -exec rm -rf {} +

            # Move staging into live
            rsync -a "$STAGING_DIR/" "$APP_DIR/"

            # Clean staging
            rm -rf "$STAGING_DIR"

            echo "✅ Deployment complete"
          EOF

      # =========================
      # VERIFY DEPLOYMENT
      # =========================
      - name: Verify deployment
        run: |
          ssh -p ${{ secrets.CPANEL_SSH_PORT }} \
          ${{ secrets.CPANEL_SSH_USER }}@${{ secrets.CPANEL_SSH_HOST }} << 'EOF'
            set -e

            APP_DIR="${{ secrets.CPANEL_TARGET_DIR }}"

            echo "========================================"
            echo " DEPLOYMENT VERIFICATION "
            echo "========================================"

            echo "index.html:"
            ls -la "$APP_DIR/index.html" || echo "missing"

            echo ".htaccess (protected):"
            ls -la "$APP_DIR/.htaccess" || echo "missing"

            echo "version.json:"
            cat "$APP_DIR/version.json" || echo "missing"

            echo "========================================"
            echo "DONE"
          EOF
